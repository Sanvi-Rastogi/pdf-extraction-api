services:
  pdf-extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-extraction-tool
    volumes:
      - ./test_pdfs:/app/test_pdfs
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
      - SKIP_MARKER=true
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    stdin_open: true
    tty: true
